server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**, /api/categories/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/orders/**, /api/webhooks/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-User-Id

jwt:
  secret: this-is-a-256-bit-secret-key-for-development-only-change-in-prod

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**, /api/categories/**
        - id: cart-service
          uri: http://cart-service:8083
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/api/orders/**, /api/webhooks/**
